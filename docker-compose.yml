services:
  event-planner-db:
    image: postgres:15-alpine
    container_name: event-planner-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: eventplanner
    volumes:
      - event-planner-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - event-planner-net
    ports:
      - "127.0.0.1:5432:5432"

  event-planner-migrate:
    container_name: event-planner-migrate
    build:
      context: .
      target: migrate
    environment:
      POSTGRES_URL_NON_POOLING: postgresql://postgres:${POSTGRES_PASSWORD}@event-planner-db:5432/eventplanner
      POSTGRES_PRISMA_URL: postgresql://postgres:${POSTGRES_PASSWORD}@event-planner-db:5432/eventplanner
    depends_on:
      event-planner-db:
        condition: service_healthy
    networks:
      - event-planner-net
    restart: "no"

  event-planner-app:
    container_name: event-planner-app
    build:
      context: .
      target: runner
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      POSTGRES_PRISMA_URL: postgresql://postgres:${POSTGRES_PASSWORD}@event-planner-db:5432/eventplanner
      POSTGRES_URL_NON_POOLING: postgresql://postgres:${POSTGRES_PASSWORD}@event-planner-db:5432/eventplanner
      DATABASE_SSL: "false"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_DISABLE_CLERK_AUTH: ${NEXT_PUBLIC_DISABLE_CLERK_AUTH:-false}
      BACKUP_SECRET_KEY: ${BACKUP_SECRET_KEY}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      MAPBOX_ACCESS_TOKEN: ${MAPBOX_ACCESS_TOKEN:-}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET_NAME: ${R2_BUCKET_NAME:-}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL:-}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      CRON_SECRET_KEY: ${CRON_SECRET_KEY:-}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-}
    depends_on:
      event-planner-migrate:
        condition: service_completed_successfully
      event-planner-db:
        condition: service_healthy
    networks:
      - event-planner-net
      - webproxy

networks:
  event-planner-net:
    driver: bridge
  webproxy:
    external: true

volumes:
  event-planner-postgres-data:
