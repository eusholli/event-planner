<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 720" width="720" height="720">
    <defs>
        <linearGradient id="rakutenRedGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E5002D" /> <stop offset="100%" stop-color="#BF0000" /> </linearGradient>
        
        <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="2" dy="6" stdDeviation="8" flood-color="#000000" flood-opacity="0.12"/>
        </filter>
    </defs>

    <rect width="720" height="720" fill="#FFFFFF"/>
    
    <g stroke="#F0F0F0" fill="none" stroke-width="2">
        <circle cx="360" cy="340" r="80" />
        <circle cx="360" cy="340" r="160" />
        <circle cx="360" cy="340" r="240" />
        <circle cx="360" cy="340" r="320" stroke-dasharray="4 8" />
    </g>

    <g filter="url(#drop-shadow)" transform="translate(10, -10)">
        <rect x="270" y="160" width="40" height="340" rx="20" fill="url(#rakutenRedGrad)"/>
        
        <path d="M 290 350 L 460 180" stroke="url(#rakutenRedGrad)" stroke-width="40" stroke-linecap="round" />
        
        <path d="M 320 330 L 480 480" stroke="url(#rakutenRedGrad)" stroke-width="40" stroke-linecap="round" />

        <circle cx="460" cy="180" r="26" fill="#333333"/>
        <circle cx="480" cy="480" r="20" fill="#333333"/>
        <circle cx="290" cy="160" r="20" fill="#333333"/>
    </g>

    <g transform="translate(510, 430)">
        <rect x="0" y="0" width="44" height="44" rx="6" fill="#BF0000" />
        <text x="22" y="32" font-family="'Noto Sans JP', 'Hiragino Sans', 'Meiryo', sans-serif" font-weight="bold" font-size="28" fill="#FFFFFF" text-anchor="middle">賢</text>
    </g>

    <text x="360" y="620" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="800" font-size="46" fill="#333333" text-anchor="middle" letter-spacing="8">KENJI</text>
    <text x="360" y="650" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif" font-weight="600" font-size="16" fill="#888888" text-anchor="middle" letter-spacing="3">MARKET INTELLIGENCE</text>
</svg>